  .top-bar {
    background: #fff;
    border-bottom: 0.5px solid #ddd;
    padding: 0 32px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .top-bar-brand {
    font-size: 15px;
    font-weight: 600;
    color: #1a1a18;
    letter-spacing: -0.01em;
  }
  .top-bar-brand span {
    color: #888;
    font-weight: 400;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    border-radius: 7px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: opacity 0.15s, background 0.15s;
    text-decoration: none;
  }
  .btn:hover { opacity: 0.85; }
  .btn-dark { background: #1a1a18; color: #fff; }
  .btn-outline { background: #fff; color: #1a1a18; border: 0.5px solid #ccc; }
  .btn-outline:hover { background: #f5f5f0; opacity: 1; }

  .page-content {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 24px;
  }

  .page-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }
  .page-title { font-size: 22px; font-weight: 600; margin: 0; }
  .page-subtitle { font-size: 13px; color: #888; margin: 2px 0 0; }

    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
  }

    .top-bar { padding: 0 16px; }
    .page-content { padding: 20px 16px; }

    background: #fff;
    border-radius: 12px;

    display: block;

    font-weight: 600;
    color: #1a1a18;
    line-height: 1.3;
    margin: 0;
  }
  .deal-meta {
    font-size: 12px;
    color: #888;
    margin: 2px 0 14px;

    padding: 3px 8px;
    border-radius: 5px;
    font-size: 11px;
    font-weight: 500;

    flex-shrink: 0;
    margin-left: 10px;

  .status-passed { background: #eee; color: #888; }
  .status-closed { background: #1a1a18; color: #fff; }

    margin-bottom: 16px;

  }
  .deal-link {

    color: #185FA5;

    height: 56px;

    justify-content: center;
    margin: 0 auto 16px;
    font-size: 24px;

    font-size: 18px;
    font-weight: 600;
    margin: 0 0 6px;
  }
  .empty-sub {
    font-size: 14px;
    color: #888;
    margin: 0 0 20px;

    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.45);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;

  .modal {
    background: #fff;
    border-radius: 12px;
    width: 100%;
    max-width: 520px;
    max-height: 90vh;
    overflow-y: auto;
    border: 0.5px solid #ddd;

    padding: 20px 24px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;

    background: none;
    border: none;
    font-size: 20px;
    cursor: pointer;
    color: #888;
    padding: 4px;
    line-height: 1;
  }
  .modal-close:hover { color: #1a1a18; }
  .modal-body { padding: 20px 24px 24px; }

  .step-indicator {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }
  .step {
    flex: 1;
    height: 3px;
    border-radius: 2px;
    background: #eee;
    transition: background 0.2s;
  }
  .step.active { background: #1a1a18; }

  .form-group { margin-bottom: 14px; }
  .form-label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: #555;
    margin-bottom: 5px;
    text-transform: uppercase;
    letter-spacing: 0.04em;

    padding: 9px 12px;
    border: 0.5px solid #ccc;
    border-radius: 7px;
    font-size: 14px;
    font-family: inherit;
    color: #1a1a18;
    background: #fff;

  .form-input:focus { border-color: #1a1a18; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    text-align: center;

  .dropzone-icon { font-size: 28px; margin-bottom: 8px; }

        </div>
      </div>
    </div>
  </div>
</div>

// ─── Storage helpers ───────────────────────────────────────────────────────────
const DEALS_KEY = 'sarvis_deals';
const INIT_KEY = 'sarvis_initialized';
const SEED_VERSION = 5; // bump to patch existing Darling's deal with new fields

function getDeals() {
  try { return JSON.parse(localStorage.getItem(DEALS_KEY) || '[]'); } catch { return []; }
}
function saveDeals(deals) {
  localStorage.setItem(DEALS_KEY, JSON.stringify(deals));
}
function getDeal(id) {
  return getDeals().find(d => d.id === id) || null;
}
function saveDeal(deal) {
  const deals = getDeals();
  const idx = deals.findIndex(d => d.id === deal.id);
  if (idx >= 0) deals[idx] = deal;
  else deals.push(deal);
  saveDeals(deals);
}

function slugify(str) {
  return str.toLowerCase()
    .replace(/[^a-z0-9\s-]/g, '')
    .replace(/\s+/g, '-')
    .replace(/-+/g, '-')
    .trim();
}
function generateId(name) {
  return slugify(name) + '-' + Date.now();
}

  narratives: {
    brief: "<p>Darling's bills exclusively through the non-taxable sales line — the standard presentation for Pennsylvania Medicaid waiver revenue (Community HealthChoices and/or OBRA waiver). No private-pay or Medicare revenue is visible, which is typical for a small rural agency that built its census on CHC referrals. The payer mix is entirely opaque from the P&L alone; confirming whether billing runs through an MCO (e.g., UPMC Health Plan, Highmark Wholecare, PA Health &amp; Wellness) or fee-for-service OLTL is the single most important diligence step before LOI.</p><p>The cost structure is what you'd expect from a non-medical home care operation: no supplies cost to speak of, labor at ~78–80% of revenue (wages + FICA + PAUC/FUTA), and a Software/IT line at 6–8% of revenue that almost certainly includes the EVV platform (required under Pennsylvania's 21st Century CURES Act compliance), scheduling software, and billing clearinghouse fees.</p>",

// ─── Initialize ────────────────────────────────────────────────────────────────
function init() {
  const storedVersion = parseInt(localStorage.getItem(INIT_KEY) || '0');

  if (storedVersion < SEED_VERSION) {
    const deals = getDeals();
    if (deals.length === 0) {
      saveDeals([DARLINGS_SEED]);
    } else {
      // Patch the existing Darling's deal with any missing fields from the seed
      const patched = deals.map(d => {
        if (d.id !== DARLINGS_SEED.id) return d;
        return {
          ...DARLINGS_SEED,
          // Preserve any user edits to these fields
          status: d.status || DARLINGS_SEED.status,
          narratives: d.narratives || DARLINGS_SEED.narratives,
          valuation: d.valuation || DARLINGS_SEED.valuation,
          chatHistory: d.chatHistory || [],
          documents: d.documents || [],
          openQuestions: d.openQuestions || [],
          // Merge checklist: preserve any user-edited items by ID, add new seed items
          diligenceChecklist: (() => {
            const existingById = {};
            (d.diligenceChecklist || []).forEach(item => { existingById[item.id] = item; });
            return DARLINGS_SEED.diligenceChecklist.map(seedItem => existingById[seedItem.id] || seedItem);
          })(),
        };
      });
      saveDeals(patched);
    }
    localStorage.setItem(INIT_KEY, String(SEED_VERSION));
  }

  renderDeals();
}

// ─── Formatting helpers ────────────────────────────────────────────────────────
function fmt$(n) {
  if (n == null) return '—';
  const abs = Math.abs(n);
  let s;
  if (abs >= 1000000) s = '$' + (abs / 1000000).toFixed(2) + 'M';
  else if (abs >= 1000) s = '$' + (abs / 1000).toFixed(0) + 'K';
  else s = '$' + abs.toFixed(0);
  return n < 0 ? '-' + s : s;
}
function fmtPct(n) {
  if (n == null) return '—';
  return (n * 100).toFixed(1) + '%';
}

function statusLabel(status) {
  const map = { active: 'Active', loi: 'LOI', passed: 'Passed', closed: 'Closed' };
  return map[status] || status;
}

function getLatestFullYearRevenue(deal) {
  if (!deal.financials || !deal.financials.periods) return null;
  const fullYears = Object.keys(deal.financials.periods).filter(k => /^\d{4}$/.test(k)).sort();
  if (!fullYears.length) return null;
  const latest = deal.financials.periods[fullYears[fullYears.length - 1]];
  return latest ? latest.revenue : null;
}
function getLatestFullYearOpMargin(deal) {
  if (!deal.financials || !deal.financials.periods) return null;
  const fullYears = Object.keys(deal.financials.periods).filter(k => /^\d{4}$/.test(k)).sort();
  if (!fullYears.length) return null;
  const p = deal.financials.periods[fullYears[fullYears.length - 1]];
  if (!p || !p.revenue || p.operatingIncome == null) return null;
  return p.operatingIncome / p.revenue;
}

// ─── Render deals ──────────────────────────────────────────────────────────────
function renderDeals() {
  const deals = getDeals();
  const grid = document.getElementById('deals-grid');
  const countEl = document.getElementById('deals-count');

  countEl.textContent = deals.length === 0 ? 'No deals yet' :
    deals.length === 1 ? '1 deal' : `${deals.length} deals`;

  if (deals.length === 0) {
    grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <h2 class="empty-title">No deals yet</h2>
        <p class="empty-sub">Create your first deal to get started with diligence.</p>
        <button class="btn btn-dark" onclick="openModal()">+ Create your first deal</button>
      </div>
    `;
    return;
  }

  grid.innerHTML = deals.map(deal => {
    const rev = deal.summary?.revenueLatestYear || getLatestFullYearRevenue(deal);
    const margin = deal.summary?.operatingMarginLatest ?? getLatestFullYearOpMargin(deal);
    const ebitda = deal.summary?.ebitdaEstimate;
    const marginClass = margin == null ? '' : margin >= 0 ? 'pos' : 'neg';

    return `
      <a class="deal-card" href="deal.html?id=${encodeURIComponent(deal.id)}">
        <div class="deal-card-top">
          <h2 class="deal-name">${escHtml(deal.name)}</h2>
          <span class="status-badge status-${deal.status || 'active'}">${statusLabel(deal.status || 'active')}</span>
        </div>
        <div class="deal-meta">${escHtml(deal.entity || '')}${deal.entity && deal.location ? ' · ' : ''}${escHtml(deal.location || '')}</div>
        <div class="deal-metrics">
          <div class="metric-card">
            <div class="metric-label">Revenue</div>
            <div class="metric-value">${fmt$(rev)}</div>
          </div>
          <div class="metric-card">
            <div class="metric-label">Op. Margin</div>
            <div class="metric-value ${marginClass}">${fmtPct(margin)}</div>
          </div>
          <div class="metric-card">
            <div class="metric-label">EBITDA est.</div>
            <div class="metric-value">${fmt$(ebitda)}</div>
          </div>
        </div>
        <div class="deal-footer">
          <span class="deal-industry">${escHtml(deal.industry || '')}</span>
          <span class="deal-link">View Deal →</span>
        </div>
      </a>
    `;
  }).join('');
}

function escHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Modal ─────────────────────────────────────────────────────────────────────
let selectedFiles = [];
let currentStep = 1;

function openModal() {
  selectedFiles = [];
  currentStep = 1;
  document.getElementById('input-name').value = '';
  document.getElementById('input-entity').value = '';
  document.getElementById('input-location').value = '';
  document.getElementById('input-industry').value = '';
  document.getElementById('file-list').innerHTML = '';
  document.getElementById('upload-status').textContent = '';
  document.getElementById('modal-overlay').classList.add('open');
  showStep(1);
  document.getElementById('input-name').focus();
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function showStep(step) {
  currentStep = step;
  document.getElementById('step-1').style.display = step === 1 ? '' : 'none';
  document.getElementById('step-2').style.display = step === 2 ? '' : 'none';
  document.getElementById('step-1-indicator').classList.toggle('active', step >= 1);
  document.getElementById('step-2-indicator').classList.toggle('active', step >= 2);
  document.getElementById('modal-title').textContent = step === 1 ? 'New Deal' : 'Add Documents';
}

function renderFileList() {
  const list = document.getElementById('file-list');
  list.innerHTML = selectedFiles.map((f, i) => `
    <div class="file-item">
      <span class="file-item-name">${escHtml(f.name)}</span>
      <span class="file-item-size">${(f.size / 1024).toFixed(0)} KB</span>
      <button class="file-item-remove" data-idx="${i}" title="Remove">&times;</button>
    </div>
  `).join('');
  list.querySelectorAll('.file-item-remove').forEach(btn => {
    btn.addEventListener('click', () => {
      selectedFiles.splice(parseInt(btn.dataset.idx), 1);
      renderFileList();
    });
  });
}

function handleFiles(fileList) {
  const statusEl = document.getElementById('upload-status');
  statusEl.textContent = '';
  for (const f of Array.from(fileList)) {
    if (f.size > 10 * 1024 * 1024) {
      statusEl.textContent = `${f.name} exceeds 10MB limit.`;
      statusEl.className = 'status-msg error';
      continue;
    }
    if (!selectedFiles.find(existing => existing.name === f.name && existing.size === f.size)) {
      selectedFiles.push(f);
    }
  }
  renderFileList();
}

async function readFileAsBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => resolve(e.target.result.split(',')[1]);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function getMediaType(file) {
  if (file.type) return file.type;
  const ext = file.name.split('.').pop().toLowerCase();
  const map = { pdf: 'application/pdf', png: 'image/png', jpg: 'image/jpeg', jpeg: 'image/jpeg', gif: 'image/gif', webp: 'image/webp', csv: 'text/csv', txt: 'text/plain' };
  return map[ext] || 'text/plain';
}

async function createDeal(skipDocs) {
  const name = document.getElementById('input-name').value.trim();
  if (!name) {
    showStep(1);
    document.getElementById('input-name').focus();
    return;
  }

  const statusEl = document.getElementById('upload-status');
  const createBtn = document.getElementById('create-deal-btn');
  const skipBtn = document.getElementById('skip-docs-btn');

  createBtn.disabled = true;
  createBtn.textContent = selectedFiles.length > 0 && !skipDocs ? 'Extracting financials…' : 'Creating deal…';
  if (skipBtn) skipBtn.disabled = true;

  const now = new Date().toISOString();
  const id = generateId(name);

  const deal = {
    id,
    name,
    entity: document.getElementById('input-entity').value.trim(),
    location: document.getElementById('input-location').value.trim(),
    industry: document.getElementById('input-industry').value.trim(),
    status: 'active',
    createdAt: now,
    asOf: null,
    summary: { revenueLatestYear: null, revenueYTD: null, ytdLabel: null, operatingMarginLatest: null, ebitdaEstimate: null, laborPct: null },
    financials: {
      lineItems: [
        {"key": "revenue", "label": "Revenue", "type": "income"},
        {"key": "cogs", "label": "Cost of Goods Sold", "type": "expense"},
        {"key": "grossProfit", "label": "Gross Profit", "type": "subtotal"},
        {"key": "wages", "label": "Wages & Salaries", "type": "expense"},
        {"key": "ficaTaxes", "label": "FICA / Payroll Taxes", "type": "expense"},
        {"key": "software", "label": "Software / IT", "type": "expense"},
        {"key": "car", "label": "Car Expenses", "type": "expense"},
        {"key": "insurance", "label": "Insurance", "type": "expense"},
        {"key": "pension", "label": "Pension / Retirement", "type": "expense"},
        {"key": "rent", "label": "Rent & Occupancy", "type": "expense"},
        {"key": "medicalSupplies", "label": "Medical Supplies", "type": "expense"},
        {"key": "employeeBenefits", "label": "Employee Benefits", "type": "expense"},
        {"key": "interestExpense", "label": "Interest Expense", "type": "expense"},
        {"key": "otherExpenses", "label": "Other Expenses", "type": "expense"},
        {"key": "totalExpenses", "label": "Total Expenses", "type": "subtotal"},
        {"key": "operatingIncome", "label": "Operating Income", "type": "subtotal"},
        {"key": "otherIncome", "label": "Other Income / (Expense)", "type": "income"},
        {"key": "netIncome", "label": "Net Income", "type": "total"}
      ],
      periods: {}
    },
    narratives: { brief: '', headline: '', forward: '' },
    flags: { red: [], amber: [], green: [] },
    valuation: { baseNetIncome: 0, interestAddback: 0, ownerWagesAddback: 0, carAddback: 0, otherAddback: 0, replacementSalary: 0, normalizedRent: 0, debt: 0 },
    market: { description: '', seniorCount: null, tam: null, competitorCount: null },
    documents: [],
    chatHistory: [],
    openQuestions: [],
    diligenceChecklist: []
  };

  // If we have files, call extract
  if (selectedFiles.length > 0 && !skipDocs) {
    try {
      statusEl.className = 'status-msg';
      statusEl.textContent = 'Reading files…';

      const files = await Promise.all(selectedFiles.map(async f => ({
        name: f.name,
        mediaType: getMediaType(f),
        data: await readFileAsBase64(f)
      })));

      statusEl.textContent = 'Sending to Claude for extraction…';

      const resp = await fetch('/api/extract', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ dealName: name, files })
      });

      if (!resp.ok) {
        const err = await resp.json();
        throw new Error(err.error || 'Extraction failed');
      }

      const extracted = await resp.json();

      // Merge extracted data into deal
      if (extracted.financials) {
        if (extracted.financials.periods) deal.financials.periods = extracted.financials.periods;
        if (extracted.financials.lineItems) deal.financials.lineItems = extracted.financials.lineItems;
      }
      if (extracted.narratives) deal.narratives = extracted.narratives;
      if (extracted.flags) deal.flags = extracted.flags;
      if (extracted.summary) {
        Object.assign(deal.summary, extracted.summary);
      }
      if (extracted.market) deal.market = extracted.market;
      if (extracted.valuation) {
        Object.assign(deal.valuation, extracted.valuation);
      }

      // Store doc metadata
      deal.documents = selectedFiles.map(f => ({
        name: f.name,
        size: f.size,
        uploadedAt: now,
        summary: `Uploaded during deal creation`
      }));

    } catch (err) {
      statusEl.className = 'status-msg error';
      statusEl.textContent = 'Extraction error: ' + err.message + '. Creating deal without financial data…';
      // Brief pause so user sees the error, then proceed
      await new Promise(r => setTimeout(r, 2000));
    }
  }

  saveDeal(deal);
  window.location.href = `deal.html?id=${encodeURIComponent(deal.id)}`;
}

// ─── Event bindings ────────────────────────────────────────────────────────────
document.getElementById('new-deal-btn').addEventListener('click', openModal);
document.getElementById('modal-close-btn').addEventListener('click', closeModal);
document.getElementById('modal-cancel-btn').addEventListener('click', closeModal);
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
});

document.getElementById('step-1-next').addEventListener('click', () => {
  if (!document.getElementById('input-name').value.trim()) {
    document.getElementById('input-name').focus();
    document.getElementById('input-name').style.borderColor = '#A32D2D';
    setTimeout(() => { document.getElementById('input-name').style.borderColor = ''; }, 2000);
    return;
  }
  showStep(2);
});

document.getElementById('step-2-back').addEventListener('click', () => showStep(1));

document.getElementById('skip-docs-btn').addEventListener('click', () => createDeal(true));
document.getElementById('create-deal-btn').addEventListener('click', () => createDeal(false));

const dropzone = document.getElementById('dropzone');
const fileInput = document.getElementById('file-input');

dropzone.addEventListener('click', () => fileInput.click());
dropzone.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') fileInput.click(); });
dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
dropzone.addEventListener('drop', e => {
  e.preventDefault();
  dropzone.classList.remove('drag-over');
  handleFiles(e.dataTransfer.files);
});
fileInput.addEventListener('change', () => {
  handleFiles(fileInput.files);
  fileInput.value = '';
});

// Keyboard shortcut
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// ─── Boot ──────────────────────────────────────────────────────────────────────
init();
</script>
